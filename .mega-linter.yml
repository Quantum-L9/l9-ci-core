# MegaLinter — non-Python filetype linting only.
# Python linting is handled by the dedicated ruff job in l9-self-ci.yml
# (fast, condition-gated, zero Docker overhead). MegaLinter covers everything
# ruff does NOT: YAML/Actions syntax, Dockerfiles, shell scripts, Markdown,
# .env files, JSON, and Terraform/HCL.

# ── Scope: explicitly enable only non-Python linters ──────────────────────
ENABLE_LINTERS:
  - ACTION_ACTIONLINT       # GitHub Actions workflow schema + expression type-check
  - BASH_SHELLCHECK         # shell scripts (also used by actionlint internally)
  - DOCKERFILE_HADOLINT     # Dockerfile best-practice + ShellCheck on RUN steps
  - ENV_DOTENV_LINTER       # .env file duplicate keys, casing, ordering
  - JSON_PRETTIER           # JSON formatting
  - MARKDOWN_MARKDOWNLINT   # Markdown heading levels, lists, fences
  - TERRAFORM_TFLINT        # Terraform/HCL syntax + provider-specific rules
  - YAML_YAMLLINT           # YAML structure, indentation, truthy values

# ── Explicitly disabled: Python is owned by ruff job ──────────────────────
DISABLE_LINTERS:
  - PYTHON_RUFF
  - PYTHON_RUFF_FORMAT
  - PYTHON_BLACK
  - PYTHON_FLAKE8
  - PYTHON_PYLINT
  - PYTHON_MYPY
  - PYTHON_PYRIGHT
  - PYTHON_BANDIT
  - PYTHON_ISORT

# ── Advisory mode: never block merge ──────────────────────────────────────
# Findings are reported as annotations but the job always exits 0.
# Flip to false once the baseline is clean.
RETURN_CODE: 0

# ── Autofix: off by default (advisory scan only) ──────────────────────────
# Enable per-linter autofix later with APPLY_FIXES once advisory pass is clean.
# APPLY_FIXES: all

# ── Linter-specific config ─────────────────────────────────────────────────
YAML_YAMLLINT_CONFIG_FILE: .yamllint.yml          # use repo config if present
MARKDOWN_MARKDOWNLINT_CONFIG_FILE: .markdownlint.yml
TERRAFORM_TFLINT_CONFIG_FILE: .tflint.hcl

# ── Performance ────────────────────────────────────────────────────────────
# Only lint files changed in the PR (much faster than full-repo scan).
FILTER_REGEX_EXCLUDE: (node_modules|venv|\.venv|build|dist|__pycache__|\.git)
SHOW_ELAPSED_TIME: true
PARALLEL: true
