# L9 v1 compatibility kernel — SBOM generation (SPDX-JSON via Syft).
# Restores the `sbom.yml@v1` reusable-workflow contract deleted in the v2
# rewrite. The SBOM is uploaded as a build artifact; release-asset upload is
# disabled because Core invariants forbid write permissions in reusable
# workflows.
name: L9 SBOM
on:
  workflow_call:
permissions:
  contents: read
jobs:
  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.0
        with:
          persist-credentials: false
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-spdx-json
          path: sbom.spdx.json
          retention-days: 90
