# L9 v1 compatibility kernel — versioned release build and publish validation.
# Restores the `release-publish.yml@v1` reusable-workflow contract deleted in
# the v2 rewrite. Language-aware: Python projects are built with `python -m
# build` and validated with twine; Node projects run `npm publish --dry-run`.
# Actual registry publication is intentionally NOT performed by this compat
# kernel: Core invariants forbid write/id-token permissions in reusable
# workflows, and unattended publishing belongs in a repo-owned workflow with
# trusted publishing. When publish-to-pypi is requested, the built artifacts
# are validated and uploaded as a build artifact for a repo-owned publish job.
# Contract: superset of the v0.1.0 inputs plus every input passed by the
# org-starter callers (publish-to-pypi).
name: L9 Release
on:
  workflow_call:
    inputs:
      python-version:
        type: string
        required: false
        default: "3.12"
      source-dir:
        type: string
        required: false
        default: "."
      test-dir:
        type: string
        required: false
        default: "tests"
      scripts-dir:
        type: string
        required: false
        default: "scripts"
      contracts-dir:
        type: string
        required: false
        default: "contracts"
      schema-path:
        type: string
        required: false
        default: ""
      requirements-file:
        type: string
        required: false
        default: "requirements.txt"
      package-name:
        type: string
        required: false
        default: ""
      enable-pypi-publish:
        type: boolean
        required: false
        default: false
      publish-to-pypi:
        type: boolean
        required: false
        default: false
      l9-ci-install-command:
        type: string
        required: false
        default: ""
      extra-install-command:
        type: string
        required: false
        default: ""
    secrets:
      github-token:
        required: false
permissions:
  contents: read
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.0
        with:
          persist-credentials: false
      - name: Detect project languages
        id: detect
        run: |
          set -euo pipefail
          python_pkg=false
          node_pkg=false
          if [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            python_pkg=true
          fi
          if [ -f "package.json" ]; then
            node_pkg=true
          fi
          echo "python=${python_pkg}" >> "$GITHUB_OUTPUT"
          echo "node=${node_pkg}" >> "$GITHUB_OUTPUT"
      # ---------- Python release ----------
      - name: Set up Python
        if: steps.detect.outputs.python == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}
      - name: Build and validate Python distribution
        if: steps.detect.outputs.python == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade "pip==26.1.2"
          pip install "build==1.3.0" "twine==6.2.0"
          if [ -n "${{ inputs.extra-install-command }}" ]; then
            ${{ inputs.extra-install-command }}
          fi
          python -m build
          twine check dist/*
      - name: Upload Python distribution artifact
        if: steps.detect.outputs.python == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-dist
          path: dist/
          retention-days: 90
      - name: Publish policy notice
        if: steps.detect.outputs.python == 'true' && (inputs.publish-to-pypi || inputs.enable-pypi-publish)
        run: |
          echo "::notice::PyPI publication is delegated to a repo-owned publish workflow with trusted publishing; validated artifacts are available in the python-dist artifact"
      # ---------- Node release ----------
      - name: Set up Node
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - name: Validate Node package (publish dry-run)
        if: steps.detect.outputs.node == 'true'
        run: |
          set -euo pipefail
          if [ -f "pnpm-lock.yaml" ]; then
            corepack enable && pnpm install --frozen-lockfile
          elif [ -f "package-lock.json" ]; then
            npm ci
          elif [ -f "yarn.lock" ]; then
            corepack enable && yarn install --frozen-lockfile
          else
            npm install
          fi
          private=$(node -e "console.log(require('./package.json').private === true)")
          if [ "${private}" = "true" ]; then
            echo "::notice::package.json is marked private; publish dry-run skipped"
          else
            npm publish --dry-run
          fi
      # ---------- Neither ----------
      - name: Non-applicable release
        if: steps.detect.outputs.python != 'true' && steps.detect.outputs.node != 'true'
        run: echo "::notice::No Python or Node package detected; nothing to release"
