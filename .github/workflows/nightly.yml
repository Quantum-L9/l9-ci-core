# L9 v1 compatibility kernel — nightly validation and dependency freshness.
# Restores the `nightly.yml@v1` reusable-workflow contract deleted in the v2
# rewrite. Language-aware: runs the applicable test suite and reports outdated
# dependencies for Python and/or Node projects. Freshness reporting is
# informational and never fails the run. Contract: superset of the v0.1.0
# inputs plus every input passed by the org-starter callers (python-version,
# run-extended-tests).
name: L9 Nightly
on:
  workflow_call:
    inputs:
      python-versions:
        type: string
        required: false
        default: '["3.12"]'
      prerelease-python-versions:
        type: string
        required: false
        default: '[]'
      python-version:
        type: string
        required: false
        default: "3.12"
      source-dir:
        type: string
        required: false
        default: "."
      test-dir:
        type: string
        required: false
        default: "tests"
      scripts-dir:
        type: string
        required: false
        default: "scripts"
      contracts-dir:
        type: string
        required: false
        default: "contracts"
      schema-path:
        type: string
        required: false
        default: ""
      requirements-file:
        type: string
        required: false
        default: "requirements.txt"
      package-name:
        type: string
        required: false
        default: ""
      enable-trufflehog:
        type: boolean
        required: false
        default: false
      l9-ci-install-command:
        type: string
        required: false
        default: ""
      run-extended-tests:
        type: boolean
        required: false
        default: false
permissions:
  contents: read
jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.0
        with:
          persist-credentials: false
      - name: Detect project languages
        id: detect
        run: |
          set -euo pipefail
          python_project=false
          node_project=false
          if [ -f "pyproject.toml" ] || [ -f "${{ inputs.requirements-file }}" ] || [ -f "setup.py" ]; then
            python_project=true
          fi
          if [ -f "package.json" ]; then
            node_project=true
          fi
          echo "python=${python_project}" >> "$GITHUB_OUTPUT"
          echo "node=${node_project}" >> "$GITHUB_OUTPUT"
      # ---------- Python path ----------
      - name: Set up Python
        if: steps.detect.outputs.python == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}
      - name: Python full test run
        if: steps.detect.outputs.python == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade "pip==26.1.2"
          if [ -f "${{ inputs.requirements-file }}" ]; then
            pip install -r "${{ inputs.requirements-file }}"
          elif [ -f "pyproject.toml" ]; then
            pip install -e ".[dev]" || pip install -e .
          fi
          pip install "pytest==8.4.2"
          if [ -n "${{ inputs.l9-ci-install-command }}" ]; then
            ${{ inputs.l9-ci-install-command }} || echo "::notice::l9-ci install command failed; continuing"
          fi
          if [ -d "${{ inputs.test-dir }}" ]; then
            pytest "${{ inputs.test-dir }}" -q
          else
            echo "::notice::Test directory '${{ inputs.test-dir }}' not found; skipping pytest"
          fi
      - name: Python dependency freshness report
        if: steps.detect.outputs.python == 'true'
        run: pip list --outdated || true
      # ---------- Node path ----------
      - name: Set up Node
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - name: Node full test run
        if: steps.detect.outputs.node == 'true'
        run: |
          set -euo pipefail
          if [ -f "pnpm-lock.yaml" ]; then
            corepack enable && pnpm install --frozen-lockfile
          elif [ -f "package-lock.json" ]; then
            npm ci
          elif [ -f "yarn.lock" ]; then
            corepack enable && yarn install --frozen-lockfile
          else
            npm install
          fi
          if node -e "const s=(require('./package.json').scripts||{});process.exit(s.test?0:1)"; then
            npm test
          elif ls vitest.config.* >/dev/null 2>&1; then
            npx vitest run
          else
            echo "::notice::No test script found; skipping Node tests"
          fi
      - name: Node dependency freshness report
        if: steps.detect.outputs.node == 'true'
        run: npm outdated || true
      # ---------- Extended tests ----------
      - name: Extended tests
        if: inputs.run-extended-tests
        run: |
          set -euo pipefail
          if [ -f "package.json" ] && node -e "const s=(require('./package.json').scripts||{});process.exit(s['test:extended']?0:1)"; then
            npm run test:extended
          elif [ -d "${{ inputs.test-dir }}/extended" ]; then
            echo "::notice::Extended test directory found; already covered by the full test run"
          else
            echo "::notice::No extended test target defined; skipping"
          fi
      # ---------- Neither ----------
      - name: Non-applicable pipeline
        if: steps.detect.outputs.python != 'true' && steps.detect.outputs.node != 'true'
        run: echo "::notice::No Python or Node project detected; nothing to validate"
