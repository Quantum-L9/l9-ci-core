# --- L9_META ---
# l9_schema: 1
# origin: l9-ci-universal-base-workflow-harvest
# layer: [ci, nightly]
# tags: [L9_TEMPLATE, nightly, regression, reusable-workflow]
# owner: platform
# status: active
# --- /L9_META ---
name: Nightly Regression Gate

on:
  workflow_call:
    inputs:
      python-versions:
        required: false
        type: string
        default: "3.12"
      prerelease-python-versions:
        required: false
        type: string
        default: "3.13"
      source-dir:
        required: false
        type: string
        default: "."
      test-dir:
        required: false
        type: string
        default: "tests"
      scripts-dir:
        required: false
        type: string
        default: "scripts"
      contracts-dir:
        required: false
        type: string
        default: "contracts"
      schema-path:
        required: false
        type: string
        default: ""
      requirements-file:
        required: false
        type: string
        default: "requirements-ci.txt"
      package-name:
        required: false
        type: string
        default: ""
      enable-trufflehog:
        required: false
        type: boolean
        default: false
      l9-ci-install-command:
        required: false
        type: string
        default: "pip install l9-ci"
  workflow_dispatch:
    inputs:
      python-versions:
        description: "Comma-separated strict Python versions."
        required: false
        type: string
        default: "3.12"
      prerelease-python-versions:
        description: "Comma-separated forward-compat Python versions."
        required: false
        type: string
        default: "3.13"
      source-dir:
        description: "Source directory."
        required: false
        type: string
        default: "."
      test-dir:
        description: "Test directory."
        required: false
        type: string
        default: "tests"
      scripts-dir:
        description: "Scripts directory."
        required: false
        type: string
        default: "scripts"
      contracts-dir:
        description: "Contracts directory."
        required: false
        type: string
        default: "contracts"
      schema-path:
        description: "Optional schema path for drift check."
        required: false
        type: string
        default: ""
      requirements-file:
        description: "CI requirements file."
        required: false
        type: string
        default: "requirements-ci.txt"
      package-name:
        description: "Optional import package name for clean-install smoke."
        required: false
        type: string
        default: ""
      enable-trufflehog:
        description: "Run optional verified-secret scan."
        required: false
        type: boolean
        default: false
      l9-ci-install-command:
        description: "Command to install l9-ci."
        required: false
        type: string
        default: "pip install l9-ci"

concurrency:
  group: l9-nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

defaults:
  run:
    shell: bash

jobs:
  prepare-matrix:
    name: prepare-python-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          strict = [v.strip() for v in os.environ["STRICT"].split(",") if v.strip()]
          prerelease = [v.strip() for v in os.environ["PRERELEASE"].split(",") if v.strip()]
          include = [{"python": v, "experimental": False} for v in strict]
          include += [{"python": v, "experimental": True} for v in prerelease]
          print("matrix=" + json.dumps({"include": include}))
          PY
        env:
          STRICT: ${{ inputs.python-versions }}
          PRERELEASE: ${{ inputs.prerelease-python-versions }}

  regression:
    name: nightly-regression-${{ matrix.python }}
    needs: prepare-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            ${{ inputs.requirements-file }}
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "${{ inputs.requirements-file }}" ]; then pip install -r "${{ inputs.requirements-file }}"; fi
          ${{ inputs.l9-ci-install-command }}
      - name: Validate Governance Thresholds
        run: l9-ci validate-thresholds --policy .github/governance/quality-thresholds.yaml
      - name: Validate Rule Modes
        run: l9-ci validate-rule-modes --policy .github/governance/rule-modes.yaml
      - name: Resolve Governance Coverage Threshold
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          from pathlib import Path
          from l9_ci.governance.thresholds import load_threshold_policy
          policy = load_threshold_policy(Path('.github/governance/quality-thresholds.yaml'))
          print(f"L9_COVERAGE_THRESHOLD={policy.coverage_for()}")
          PY
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
      - name: Lint and type smoke
        run: |
          ruff check "${{ inputs.source-dir }}" --output-format=github
          mypy "${{ inputs.source-dir }}" --show-error-codes --pretty --install-types --non-interactive --ignore-missing-imports
      - name: Run nightly tests
        run: |
          if [ "$L9_COVERAGE_THRESHOLD" = "0" ]; then
            pytest "${{ inputs.test-dir }}" -q --tb=short
          else
            pytest "${{ inputs.test-dir }}" -q --tb=short --cov="${{ inputs.source-dir }}" --cov-report=xml --cov-report=term-missing --cov-fail-under="$L9_COVERAGE_THRESHOLD"
          fi
      - name: Clean install import smoke
        if: ${{ inputs.package-name != '' }}
        run: |
          python -m pip uninstall -y "${{ inputs.package-name }}" || true
          python -m pip install .
          python - <<'PY'
          import importlib, os
          importlib.import_module(os.environ["PACKAGE_NAME"])
          PY
        env:
          PACKAGE_NAME: ${{ inputs.package-name }}
      - name: Contract spec lint
        run: |
          if [ -d "${{ inputs.contracts-dir }}" ]; then
            find "${{ inputs.contracts-dir }}" -type f -maxdepth 2 -print
          else
            echo "Contracts directory not present; skipping."
          fi
      - name: Optional schema drift check
        run: |
          if [ -n "${{ inputs.schema-path }}" ] && [ -f "${{ inputs.scripts-dir }}/generate_schema.py" ]; then
            python "${{ inputs.scripts-dir }}/generate_schema.py"
            git diff --exit-code "${{ inputs.schema-path }}"
          else
            echo "Schema drift check disabled or generator missing."
          fi
      - name: Strict nightly pip-audit
        run: |
          python -m pip install pip-audit
          pip-audit --strict
      - name: Optional TruffleHog verified secret scan
        if: ${{ inputs.enable-trufflehog }}
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  all-gates-passed:
    name: all-gates-passed
    needs: [prepare-matrix, regression]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate nightly result
        run: |
          if [ "${{ needs.regression.result }}" = "failure" ]; then
            echo "::error::Nightly regression failed."
            exit 1
          fi
          echo "Nightly regression completed with result: ${{ needs.regression.result }}"
