# --- L9_META ---
# l9_schema: 1
# origin: l9-ci-universal-base-workflow-harvest
# layer: [ci, pre-commit]
# tags: [L9_TEMPLATE, pre-commit, reusable-workflow]
# owner: platform
# status: active
# --- /L9_META ---
name: Pre-Commit CI Gate

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
      pre-commit-version:
        required: false
        type: string
        default: "3.7.1"
      config-path:
        required: false
        type: string
        default: ".pre-commit-config.yaml"
      install-command:
        required: false
        type: string
        default: "pip install -e .[dev]"
      enable-version-drift-check:
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version."
        required: false
        type: string
        default: "3.12"
      pre-commit-version:
        description: "pre-commit version."
        required: false
        type: string
        default: "3.7.1"
      config-path:
        description: "Pre-commit config path."
        required: false
        type: string
        default: ".pre-commit-config.yaml"
      install-command:
        description: "Package install command before hooks run."
        required: false
        type: string
        default: "pip install -e .[dev]"
      enable-version-drift-check:
        description: "Check ruff/mypy hook version drift."
        required: false
        type: boolean
        default: true

concurrency:
  group: l9-pre-commit-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate-hook-config:
    name: validate-hook-config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Install pre-commit
        run: python -m pip install pre-commit==${{ inputs.pre-commit-version }}
      - name: Validate hook config syntax
        run: pre-commit validate-config "${{ inputs.config-path }}"

  pre-commit-run:
    name: pre-commit-run-all-files
    needs: validate-hook-config
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Restore pre-commit cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ inputs.python-version }}-${{ hashFiles(inputs.config-path) }}
          restore-keys: |
            pre-commit-${{ inputs.python-version }}-
      - name: Install pre-commit and package dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit==${{ inputs.pre-commit-version }}
          ${{ inputs.install-command }}
      - name: Run all pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure --config "${{ inputs.config-path }}"
      - name: Show hook diff if failed
        if: failure()
        run: |
          echo "::warning::Pre-commit hooks modified files. Run pre-commit locally and commit fixes."
          git diff --stat

  hook-version-drift:
    name: hook-version-drift-check
    needs: validate-hook-config
    if: ${{ inputs.enable-version-drift-check }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Install package dependencies
        run: |
          python -m pip install --upgrade pip
          ${{ inputs.install-command }}
      - name: Check ruff and mypy version drift
        run: |
          python - <<'PY'
          from pathlib import Path
          import importlib.metadata as md
          import re
          config = Path("${{ inputs.config-path }}").read_text(encoding="utf-8")
          checks = {
              "ruff": r"astral-sh/ruff-pre-commit.*?rev:\s*v?([\d.]+)",
              "mypy": r"mirrors-mypy.*?rev:\s*v?([\d.]+)",
          }
          for package, pattern in checks.items():
              try:
                  installed = md.version(package)
              except md.PackageNotFoundError:
                  print(f"::warning::{package} is not installed; cannot compare hook version")
                  continue
              match = re.search(pattern, config, re.DOTALL)
              hook = match.group(1) if match else "NOT_FOUND"
              if hook != installed:
                  print(f"::warning::{package} version drift: installed={installed}, hook={hook}")
              else:
                  print(f"{package} version parity confirmed: {installed}")
          PY

  pre-commit-passed:
    name: pre-commit-passed
    needs: [validate-hook-config, pre-commit-run, hook-version-drift]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Evaluate pre-commit gates
        run: |
          FAILED=""
          [ "${{ needs.validate-hook-config.result }}" = "success" ] || FAILED="$FAILED validate-hook-config=${{ needs.validate-hook-config.result }}"
          [ "${{ needs.pre-commit-run.result }}" = "success" ] || FAILED="$FAILED pre-commit-run=${{ needs.pre-commit-run.result }}"
          if [ -n "$FAILED" ]; then
            echo "::error::Pre-commit gates failed:$FAILED"
            exit 1
          fi
          echo "All pre-commit gates passed."
