# L9 v1 compatibility kernel — OpenSSF Scorecard analysis.
# Restores the `scorecard.yml@v1` reusable-workflow contract deleted in the v2
# rewrite. Core invariants forbid write permissions in reusable workflows, so
# results are uploaded as a build artifact instead of the code-scanning SARIF
# feed, and publish_results is disabled (it would require id-token: write).
# scorecard-action only supports push-to-default-branch and schedule events,
# so the job self-skips on pull_request to avoid guaranteed failures.
name: L9 Scorecard
on:
  workflow_call:
permissions:
  contents: read
jobs:
  scorecard:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.0
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@05b42c624433fc40578a4040d5cf5e36ddca8cde # v2.4.2
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false
      - name: Upload Scorecard results artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-results
          path: scorecard.sarif
          retention-days: 30
  scorecard-skipped:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Explain skip
        run: echo "::notice::OpenSSF Scorecard only supports push and schedule events; skipped on pull_request"
