# --- L9_META ---
# l9_schema: 1
# origin: l9-ci-core
# layer: [ci, self-test, dogfood]
# tags: [L9_CI, dogfood, self-ci, caller]
# owner: platform
# status: active
# --- /L9_META ---
#
# Self-CI: l9-ci-core runs its OWN reusable pr-pipeline.yml on every PR and push
# to main. The reusable is referenced by LOCAL PATH (`./.github/workflows/...`)
# so each PR exercises the pipeline exactly as modified in that PR (no floating
# @ref). The SDK is installed from a pinned commit until l9-ci is published; once
# published, drop the l9-ci-install-command override so the reusable default
# (`pip install l9-ci`) applies.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: l9-core-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  context:
    name: Compute PR Context
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      changed-files: ${{ steps.diff.outputs.changed_files }}
      pr-labels: ${{ steps.labels.outputs.pr_labels }}
      labels-known: ${{ steps.labels.outputs.labels_known }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute changed files
        id: diff
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          NULL_SHA: "0000000000000000000000000000000000000000"
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$BASE_SHA"; head="$HEAD_SHA"
          else
            base="$BEFORE_SHA"; head="$AFTER_SHA"
          fi
          files=""
          if [ -n "$base" ] && [ "$base" != "$NULL_SHA" ] && git rev-parse --verify --quiet "$base" >/dev/null; then
            files="$(git diff --name-only "$base" "$head" | paste -sd, -)"
          fi
          echo "changed_files=$files" >> "$GITHUB_OUTPUT"
      - name: Read PR labels
        id: labels
        env:
          EVENT_NAME: ${{ github.event_name }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "pr_labels=$LABELS" >> "$GITHUB_OUTPUT"
            echo "labels_known=true" >> "$GITHUB_OUTPUT"
          else
            # Push events carry no PR labels; fail closed to unknown_diff.
            echo "pr_labels=" >> "$GITHUB_OUTPUT"
            echo "labels_known=false" >> "$GITHUB_OUTPUT"
          fi

  pr-pipeline:
    name: L9 PR Pipeline (self)
    needs: context
    uses: ./.github/workflows/pr-pipeline.yml
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
      pull-requests: read
    with:
      python-version: "3.12"
      source-dir: "."
      test-dir: "tests/"
      changed-files: ${{ needs.context.outputs.changed-files }}
      pr-labels: ${{ needs.context.outputs.pr-labels }}
      labels-known: ${{ needs.context.outputs.labels-known == 'true' }}
      # Install the SDK from a pinned commit (l9-ci is not yet published).
      # Switch to the reusable default `pip install l9-ci` once it publishes.
      l9-ci-install-command: 'python -m pip install "l9-ci @ git+https://github.com/Quantum-L9/l9-ci-sdk.git@d32e84b7c00fc88b85f2639471dd64126251e09e"'
