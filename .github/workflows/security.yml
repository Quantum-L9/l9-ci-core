name: L9 Security
on:
  workflow_call:
    inputs:
      python-version:
        type: string
        required: false
        default: "3.12"
      source-dir:
        type: string
        required: false
        default: "."
      l9-ci-install-command:
        type: string
        required: false
        default: 'python -m pip install "l9-ci @ git+https://github.com/Quantum-L9/l9-ci-sdk.git@d32e84b7c00fc88b85f2639471dd64126251e09e"'
    secrets:
      SDK_TOKEN:
        required: false
jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}
      - name: Configure private SDK access
        env:
          SDK_TOKEN: ${{ secrets.SDK_TOKEN }}
        run: |
          # Public SDK repo needs no token. When SDK_TOKEN is provided, rewrite the
          # git transport so the pinned git+https SDK install authenticates. The
          # token is read from env and never echoed.
          if [ -n "${SDK_TOKEN:-}" ]; then
            # Write auth into a temporary gitconfig (never ~/.gitconfig) so the token is
            # not persisted in the runner's global git config. Export the path for
            # this step and, via GITHUB_ENV, for the later SDK-install step; it lives
            # under RUNNER_TEMP and is discarded when the ephemeral job ends.
            export GIT_CONFIG_GLOBAL="${RUNNER_TEMP}/l9-sdk-gitconfig"
            git config --file "$GIT_CONFIG_GLOBAL" url."https://x-access-token:${SDK_TOKEN}@github.com/".insteadOf "https://github.com/"
            echo "GIT_CONFIG_GLOBAL=${GIT_CONFIG_GLOBAL}" >> "$GITHUB_ENV"
          fi
      - run: |
          python -m pip install --upgrade pip
          ${{ inputs.l9-ci-install-command }}
          # Ensure the security CLIs this workflow invokes are present when the
          # caller doesn't already ship them (only install when missing).
          command -v pip-audit >/dev/null 2>&1 || pip install pip-audit
          command -v bandit >/dev/null 2>&1 || pip install bandit
      # --- Independent scanners: collect-all (fail LOUD, run EVERY scanner) ---
      # Each scanner runs to completion even if a prior one failed; the Aggregate
      # step fails the job if any BLOCKING scanner failed. bandit is advisory
      # (surfaced, never blocks). Setup/install above stays fail-fast.
      - name: Run Gitleaks (OSS CLI)
        id: gitleaks
        continue-on-error: true
        # gitleaks/gitleaks-action requires a paid GITLEAKS_LICENSE for
        # organizations. Use the OSS gitleaks CLI instead — same scanner, no
        # license wall — pinned to a verified release and SHA-256. Honors
        # .gitleaks.toml when present; fails on any detected leak (redacted).
        run: |
          set -euo pipefail
          # l9-download: gitleaks-linux-x64
          TOOL_URL="https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz"
          TOOL_SHA256="ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d"
          tmp="$(mktemp -d)"
          archive="$tmp/gitleaks.tar.gz"
          # Verify the download against the pinned SHA-256 BEFORE unpacking or
          # executing the binary (supply-chain integrity). Fail closed on any
          # mismatch.
          curl --fail --location --silent --show-error "$TOOL_URL" --output "$archive"
          sha256sum --check --strict <<< "$TOOL_SHA256  $archive"
          tar -xzf "$archive" -C "$tmp" gitleaks
          config_arg=""
          if [ -f .gitleaks.toml ]; then config_arg="--config .gitleaks.toml"; fi
          "$tmp/gitleaks" dir . --no-banner --redact $config_arg
      - name: Run pip-audit
        id: pip_audit
        continue-on-error: true
        run: |
          # Audit the PROJECT's declared dependencies, not the ephemeral CI runner
          # environment (which pulls in the scan tools' own transitive deps and can
          # fail on advisories unrelated to the repo). Prefer a requirements
          # manifest when present; fall back to an environment audit otherwise.
          if [ -f requirements-ci.txt ]; then
            pip-audit --desc --requirement requirements-ci.txt
          elif [ -f requirements.txt ]; then
            pip-audit --desc --requirement requirements.txt
          else
            pip-audit --desc
          fi
      - name: Run Bandit (advisory)
        id: bandit
        continue-on-error: true
        run: bandit -r "${{ inputs.source-dir }}" -ll -f screen --exclude ./venv,./.venv,./tests,./build,./dist
      - name: Dependency Review
        id: dep_review
        continue-on-error: true
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: high
      - name: Aggregate security results
        if: always()
        run: |
          fail=0
          # Blocking scanners — counted (skipped is not a failure: dependency-
          # review is PR-only, so it is 'skipped' on push events).
          for c in "gitleaks:${{ steps.gitleaks.outcome }}" \
                   "pip-audit:${{ steps.pip_audit.outcome }}" \
                   "dependency-review:${{ steps.dep_review.outcome }}"; do
            name="${c%%:*}"; outcome="${c##*:}"
            case "$outcome" in
              success|skipped) : ;;
              *) echo "::error::security scanner failed: $name ($outcome)"; fail=1 ;;
            esac
          done
          echo "::notice::advisory scanners: bandit=${{ steps.bandit.outcome }}"
          exit $fail
