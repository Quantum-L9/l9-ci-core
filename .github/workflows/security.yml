# L9 v1 compatibility kernel — Security scan (secrets + dependency audit).
# Restores the `security.yml@v1` reusable-workflow contract deleted in the v2
# rewrite (54a2f2f) so org-starter callers resolve again. Language-aware:
# Python gates run only when a Python project is detected, Node gates only
# when package.json is present. Gates that do not apply emit a notice and pass.
# Contract: superset of the v0.1.0 inputs plus every input passed by the
# Quantum-L9/.github org-starter callers (run-npm-audit).
name: L9 Security
on:
  workflow_call:
    inputs:
      python-version:
        type: string
        required: false
        default: "3.12"
      source-dir:
        type: string
        required: false
        default: "."
      l9-ci-install-command:
        type: string
        required: false
        default: ""
      run-npm-audit:
        type: boolean
        required: false
        default: false
permissions:
  contents: read
jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect project languages
        id: detect
        run: |
          set -euo pipefail
          python_project=false
          node_project=false
          if [ -f "pyproject.toml" ] || [ -f "requirements.txt" ] || [ -f "setup.py" ]; then
            python_project=true
          fi
          if [ -f "package.json" ]; then
            node_project=true
          fi
          echo "python=${python_project}" >> "$GITHUB_OUTPUT"
          echo "node=${node_project}" >> "$GITHUB_OUTPUT"
          echo "Detected: python=${python_project} node=${node_project}"
      - name: Secret scan (gitleaks)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.3"
          GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          actual_sha="$(sha256sum /tmp/gitleaks.tar.gz | awk '{print $1}')"
          if [ "${actual_sha}" != "${GITLEAKS_SHA256}" ]; then
            echo "::error::gitleaks checksum mismatch: got ${actual_sha}"
            exit 1
          fi
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          if [ -f ".gitleaks.toml" ]; then
            /tmp/gitleaks git --config .gitleaks.toml --no-banner --redact --exit-code 1 .
          else
            /tmp/gitleaks git --no-banner --redact --exit-code 1 .
          fi
      - name: Set up Python
        if: steps.detect.outputs.python == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}
      - name: Python dependency audit (pip-audit)
        if: steps.detect.outputs.python == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade "pip==26.1.2"
          pip install "pip-audit==2.9.0"
          if [ -n "${{ inputs.l9-ci-install-command }}" ]; then
            ${{ inputs.l9-ci-install-command }} || echo "::notice::l9-ci install command failed; continuing"
          fi
          pip-audit --desc || pip-audit --desc -r requirements.txt
      - name: Python static security scan (bandit)
        if: steps.detect.outputs.python == 'true'
        run: |
          set -euo pipefail
          pip install "bandit==1.8.6"
          bandit -r "${{ inputs.source-dir }}" -ll -f screen \
            --exclude ./venv,./.venv,./tests,./build,./dist \
            || echo "::notice::Bandit warnings are non-blocking"
      - name: Node dependency audit (npm audit)
        if: steps.detect.outputs.node == 'true' && (inputs.run-npm-audit || hashFiles('package-lock.json') != '')
        run: |
          set -euo pipefail
          if [ -f "package-lock.json" ]; then
            npm audit --audit-level=high
          else
            echo "::notice::No package-lock.json; skipping npm audit"
          fi
      - name: Non-applicable gates
        if: steps.detect.outputs.python != 'true' && steps.detect.outputs.node != 'true'
        run: echo "::notice::No Python or Node project detected; only the secret scan ran"
