name: L9 Security
on:
  workflow_call:
    inputs:
      python-version:
        type: string
        required: false
        default: "3.12"
      source-dir:
        type: string
        required: false
        default: "."
      l9-ci-install-command:
        type: string
        required: false
        default: 'python -m pip install "l9-ci @ git+https://github.com/Quantum-L9/l9-ci-sdk.git@d32e84b7c00fc88b85f2639471dd64126251e09e"'
    secrets:
      SDK_TOKEN:
        required: false
jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Configure private SDK access
        env:
          SDK_TOKEN: ${{ secrets.SDK_TOKEN }}
        run: |
          # Public SDK repo needs no token. When SDK_TOKEN is provided, rewrite the
          # git transport so the pinned git+https SDK install authenticates. The
          # token is read from env and never echoed.
          if [ -n "${SDK_TOKEN:-}" ]; then
            git config --global url."https://x-access-token:${SDK_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
      - run: |
          python -m pip install --upgrade pip
          ${{ inputs.l9-ci-install-command }}
          # Ensure the security CLIs this workflow invokes are present when the
          # caller doesn't already ship them (only install when missing).
          command -v pip-audit >/dev/null 2>&1 || pip install pip-audit
          command -v bandit >/dev/null 2>&1 || pip install bandit
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
      - run: pip-audit --desc
      - run: bandit -r "${{ inputs.source-dir }}" -ll -f screen --exclude ./venv,./.venv,./tests,./build,./dist || echo "Bandit warnings are non-blocking"
      - if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
