name: Core Self-Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test tools
        run: python -m pip install pyyaml pytest
      - name: Byte-compile repository
        run: python -m compileall .
      - name: Governance and workflow tests
        run: pytest -q
