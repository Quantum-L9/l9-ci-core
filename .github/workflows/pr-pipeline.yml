# --- L9_META ---
# l9_schema: 1
# origin: l9-ci-universal-base
# layer: [ci]
# tags: [L9_TEMPLATE, ci, reusable-workflow]
# owner: platform
# status: active
# --- /L9_META ---
name: PR Pipeline Gate

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
      source-dir:
        required: false
        type: string
        default: "."
      test-dir:
        required: false
        type: string
        default: "tests/"
      requirements-file:
        required: false
        type: string
        default: "requirements-ci.txt"
      extra-install-command:
        required: false
        type: string
        default: ""
      enable-pydantic-strict:
        required: false
        type: boolean
        default: false
      l9-ci-install-command:
        required: false
        type: string
        default: "pip install l9-ci"
      changed-files:
        required: false
        type: string
        default: ""
      pr-labels:
        required: false
        type: string
        default: ""
      labels-known:
        required: false
        type: boolean
        default: true

concurrency:
  group: l9-pr-pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Structure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            ${{ inputs.requirements-file }}
            pyproject.toml
      - name: Install CI Tools
        env:
          # Read the free-form extra install command from env so an EMPTY value
          # does not render as `then ; fi` (a bash parse error) — which broke
          # every caller that didn't pass extra-install-command.
          EXTRA_INSTALL_COMMAND: ${{ inputs.extra-install-command }}
        run: |
          python -m pip install --upgrade pip
          if [ -f "${{ inputs.requirements-file }}" ]; then pip install -r "${{ inputs.requirements-file }}"; fi
          ${{ inputs.l9-ci-install-command }}
          # Run the caller's extra install command via `bash -c` rather than
          # `eval`: this executes the exact command string in a subshell without
          # the additional re-parsing/expansion pass that `eval` performs, while
          # still allowing multi-command strings.
          if [ -n "$EXTRA_INSTALL_COMMAND" ]; then bash -c "$EXTRA_INSTALL_COMMAND"; fi
          # The "Validate YAML Files" step imports PyYAML; ensure it's present
          # when the caller's deps don't already provide it.
          python -c "import yaml" 2>/dev/null || pip install pyyaml
      # --- Independent checks: collect-all (fail LOUD, run EVERY check) ---
      # These validations are independent of one another, so each runs to
      # completion even if a prior one failed (continue-on-error), and the
      # "Aggregate" step below fails the job loudly if ANY of them failed. This
      # surfaces the COMPLETE failure surface in one run instead of aborting at
      # the first failing check and forcing fix→push→hit-the-next round-trips.
      # The setup/install steps above stay fail-fast — a broken install makes
      # these checks noise, not signal.
      - name: Run L9 Validate Stage
        id: l9_validate
        continue-on-error: true
        run: l9-ci run-pipeline --stage validate --ci github --emit-dir artifacts/ci
      - name: Validate YAML Files
        id: yaml_valid
        continue-on-error: true
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys, yaml
          errors = []
          for path in list(Path('.github/workflows').glob('*.yml')) + list(Path('.github/workflows').glob('*.yaml')):
              try:
                  yaml.safe_load(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  errors.append(f"{path}: {exc}")
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          PY
      - name: L9 PacketEnvelope Prohibition
        id: transport_packet
        continue-on-error: true
        # Exclude the intentional "bad" contract fixtures (they exist to exercise
        # the rule); mirrors the semgrep exclude. Harmless for consumers without
        # this path. Trailing slash = directory-prefix exclude.
        run: l9-ci check-transport-packet . --exclude tests/fixtures/semgrep/
      - name: L9 Deprecated API Check
        id: deprecated_api
        continue-on-error: true
        run: l9-ci check-deprecated-api .
      - name: Validate Governance Thresholds
        id: thresholds
        continue-on-error: true
        run: l9-ci validate-thresholds --policy .github/governance/quality-thresholds.yaml
      - name: Validate Rule Modes
        id: rule_modes
        continue-on-error: true
        run: l9-ci validate-rule-modes --policy .github/governance/rule-modes.yaml
      - name: Aggregate validate results
        if: always()
        run: |
          fail=0
          for c in "l9-validate-stage:${{ steps.l9_validate.outcome }}" \
                   "yaml-files:${{ steps.yaml_valid.outcome }}" \
                   "transport-packet:${{ steps.transport_packet.outcome }}" \
                   "deprecated-api:${{ steps.deprecated_api.outcome }}" \
                   "governance-thresholds:${{ steps.thresholds.outcome }}" \
                   "rule-modes:${{ steps.rule_modes.outcome }}"; do
            name="${c%%:*}"; outcome="${c##*:}"
            case "$outcome" in
              success|skipped) : ;;
              *) echo "::error::validate check failed: $name ($outcome)"; fail=1 ;;
            esac
          done
          exit $fail
      - name: Upload Validate Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-validate-${{ inputs.python-version }}
          path: artifacts/ci/*
          if-no-files-found: error

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            ${{ inputs.requirements-file }}
            pyproject.toml
      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          if [ -f "${{ inputs.requirements-file }}" ]; then pip install -r "${{ inputs.requirements-file }}"; fi
          ${{ inputs.l9-ci-install-command }}
          # Ensure the lint tools this job invokes are present without shadowing a
          # caller-pinned version: only install when the command is missing.
          command -v ruff >/dev/null 2>&1 || pip install ruff
          command -v mypy >/dev/null 2>&1 || pip install mypy
      # --- Independent checks: collect-all (fail LOUD, run EVERY check) ---
      # ruff-check / ruff-format / mypy are independent: a ruff failure must not
      # hide the mypy result. Each runs to completion; the Aggregate step fails
      # the job if ANY failed.
      - name: Run L9 Lint Stage
        id: l9_lint
        continue-on-error: true
        run: l9-ci run-pipeline --stage lint --ci github --emit-dir artifacts/ci
      - name: Ruff lint
        id: ruff_check
        continue-on-error: true
        run: ruff check . --output-format=github
      - name: Ruff format check
        id: ruff_format
        continue-on-error: true
        run: ruff format --check .
      - name: Mypy
        id: mypy
        continue-on-error: true
        run: mypy "${{ inputs.source-dir }}" --show-error-codes --pretty --install-types --non-interactive --ignore-missing-imports
      - name: Aggregate lint results
        if: always()
        run: |
          fail=0
          for c in "l9-lint-stage:${{ steps.l9_lint.outcome }}" \
                   "ruff-check:${{ steps.ruff_check.outcome }}" \
                   "ruff-format:${{ steps.ruff_format.outcome }}" \
                   "mypy:${{ steps.mypy.outcome }}"; do
            name="${c%%:*}"; outcome="${c##*:}"
            case "$outcome" in
              success|skipped) : ;;
              *) echo "::error::lint check failed: $name ($outcome)"; fail=1 ;;
            esac
          done
          exit $fail
      - name: Upload Lint Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-lint-${{ inputs.python-version }}
          path: artifacts/ci/*
          if-no-files-found: error

  semgrep:
    name: Semgrep Policy Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run Semgrep When Config Exists
        run: |
          if [ -d .semgrep ]; then
            python -m pip install --upgrade pip semgrep
            # Exclude the intentional "bad" contract fixtures: they exist to
            # exercise the rules and would otherwise fail Semgrep in this repo.
            semgrep --config .semgrep/ --error --quiet --exclude tests/fixtures/semgrep
          else
            echo "No .semgrep directory; skipping semgrep policy check."
          fi

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            ${{ inputs.requirements-file }}
            pyproject.toml
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "${{ inputs.requirements-file }}" ]; then pip install -r "${{ inputs.requirements-file }}"; fi
          ${{ inputs.l9-ci-install-command }}
          pip install -e ".[dev]" || pip install -e . || echo "::notice::no local editable package to install"
          # Ensure pytest + the plugins this job's invocation relies on are present
          # (only when missing, so caller-pinned versions are preserved).
          command -v pytest >/dev/null 2>&1 || pip install pytest
          python -c "import pytest_cov" 2>/dev/null || pip install pytest-cov
          python -c "import xdist" 2>/dev/null || pip install pytest-xdist
          python -c "import pytest_timeout" 2>/dev/null || pip install pytest-timeout
      - name: Resolve Governance Coverage Threshold
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          from pathlib import Path
          from l9_ci.governance.thresholds import load_threshold_policy
          policy = load_threshold_policy(Path('.github/governance/quality-thresholds.yaml'))
          print(f"L9_COVERAGE_THRESHOLD={policy.coverage_for()}")
          PY
      - name: Run L9 Test Stage
        run: l9-ci run-pipeline --stage test --ci github --matrix python=${{ inputs.python-version }} --emit-dir artifacts/ci
      - name: Run Tests with Coverage
        env:
          TESTING: "true"
        run: |
          # Collect-all within pytest: no -x/--exitfirst (run the whole suite);
          # -rA reports every outcome; --continue-on-collection-errors surfaces
          # all import/collection failures instead of aborting at the first.
          PYTHONPATH=. pytest "${{ inputs.test-dir }}" -n auto --cov="${{ inputs.source-dir }}" --cov-report=xml --cov-report=term-missing --cov-fail-under="$L9_COVERAGE_THRESHOLD" --timeout=300 --tb=short -rA --continue-on-collection-errors -v
      - name: Upload Test Summary
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-test-${{ inputs.python-version }}
          path: artifacts/ci/*
          if-no-files-found: error
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          # Match the other jobs: without an explicit dependency path, the pip
          # cache can't resolve a file and setup-python errors on repos that lack
          # a standard requirements/pyproject file.
          cache-dependency-path: |
            ${{ inputs.requirements-file }}
            pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          if [ -f "${{ inputs.requirements-file }}" ]; then pip install -r "${{ inputs.requirements-file }}"; fi
          ${{ inputs.l9-ci-install-command }}
          # Ensure the security CLIs this job invokes are present when the caller
          # doesn't already ship them (only install when missing).
          command -v pip-audit >/dev/null 2>&1 || pip install pip-audit
          command -v safety >/dev/null 2>&1 || pip install safety
          command -v bandit >/dev/null 2>&1 || pip install bandit
      # --- Independent scanners: collect-all (fail LOUD, run EVERY scanner) ---
      # A gitleaks failure must not hide a pip-audit or dependency-review result.
      # Each scanner runs to completion; the Aggregate step fails the job if any
      # BLOCKING scanner failed. safety + bandit are ADVISORY: they run and their
      # outcome is surfaced, but they never fail the job (they were previously
      # `|| echo`-swallowed — same non-blocking intent, now explicit and visible).
      - name: Run L9 Security Stage
        id: l9_security
        continue-on-error: true
        run: l9-ci run-pipeline --stage security --ci github --emit-dir artifacts/ci
      - name: Run Gitleaks (OSS CLI)
        id: gitleaks
        continue-on-error: true
        # gitleaks/gitleaks-action requires a paid GITLEAKS_LICENSE for
        # organizations. Use the OSS gitleaks CLI instead — same scanner, no
        # license wall — pinned to a verified release. Honors .gitleaks.toml when
        # present; fails on any detected leak (redacted in logs).
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.1"
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          tmp="$(mktemp -d)"
          curl -fsSL "${base}/${tarball}" -o "$tmp/${tarball}"
          # Verify the download against the release-published SHA256 checksums
          # BEFORE executing the binary (supply-chain integrity). Fail closed on a
          # mismatch or a missing checksum entry (grep miss -> pipefail non-zero).
          curl -fsSL "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o "$tmp/checksums.txt"
          ( cd "$tmp" && grep " ${tarball}\$" checksums.txt | sha256sum -c - )
          tar -xzf "$tmp/${tarball}" -C "$tmp" gitleaks
          config_arg=""
          if [ -f .gitleaks.toml ]; then config_arg="--config .gitleaks.toml"; fi
          "$tmp/gitleaks" dir . --no-banner --redact $config_arg
      - name: Run pip-audit
        id: pip_audit
        continue-on-error: true
        run: |
          # Audit the PROJECT's declared dependencies, not the ephemeral CI
          # runner environment (which pulls in its own transitive deps for the
          # audit/scan tools themselves). Fall back to an environment audit only
          # when the repo ships no requirements manifest.
          if [ -f "${{ inputs.requirements-file }}" ]; then
            pip-audit --desc --requirement "${{ inputs.requirements-file }}"
          else
            pip-audit --desc
          fi
      - name: Run Safety Check (advisory)
        id: safety
        continue-on-error: true
        run: safety check
      - name: Run Bandit (advisory)
        id: bandit
        continue-on-error: true
        run: bandit -r "${{ inputs.source-dir }}" -ll -f screen --exclude ./venv,./.venv,./tests,./build,./dist
      - name: Dependency Review
        id: dep_review
        continue-on-error: true
        # Blocks a PR that introduces a high-severity dependency advisory.
        # Requires the repository's Dependency Graph to be enabled (Settings →
        # Code security → Dependency graph); on private repos the dependency
        # review API additionally requires GitHub Advanced Security.
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
      - name: Aggregate security results
        if: always()
        run: |
          fail=0
          # Blocking scanners — counted in the tally (skipped is not a failure:
          # dependency-review is PR-only, so it is 'skipped' on push events).
          for c in "l9-security-stage:${{ steps.l9_security.outcome }}" \
                   "gitleaks:${{ steps.gitleaks.outcome }}" \
                   "pip-audit:${{ steps.pip_audit.outcome }}" \
                   "dependency-review:${{ steps.dep_review.outcome }}"; do
            name="${c%%:*}"; outcome="${c##*:}"
            case "$outcome" in
              success|skipped) : ;;
              *) echo "::error::security scanner failed: $name ($outcome)"; fail=1 ;;
            esac
          done
          # Advisory scanners — surfaced but NEVER block.
          echo "::notice::advisory scanners: safety=${{ steps.safety.outcome }} bandit=${{ steps.bandit.outcome }}"
          exit $fail
      - name: Upload Security Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-security-${{ inputs.python-version }}
          path: artifacts/ci/*
          if-no-files-found: error

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Generate Software Bill of Materials
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-release-assets: false

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          # Publishing requires the default branch; skip it on PRs (analysis
          # + SARIF upload still run).
          publish_results: ${{ github.event_name != 'pull_request' }}
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard.sarif

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs: [validate, lint, semgrep, test, security, sbom, scorecard]
    permissions:
      contents: read
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install L9 CI SDK
        run: |
          python -m pip install --upgrade pip
          ${{ inputs.l9-ci-install-command }}
      # The steps below (download, gate-stage, payload render) are intermediate
      # reporting artifacts. They are continue-on-error so the AUTHORITATIVE
      # "Evaluate Required Results" step always runs and emits the single
      # complete pass/fail report — a failure in a reporting step must not hide
      # the aggregate verdict. (The SDK install step above stays fail-fast: no
      # l9-ci means no verdict.)
      - name: Download CI Summary Artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: ci-summary-*
          path: artifacts/ci
          merge-multiple: true
      - name: Run L9 Gate Stage
        continue-on-error: true
        run: l9-ci run-pipeline --stage gate --ci github --emit-dir artifacts/ci
      - name: Render Agent Review Payload
        continue-on-error: true
        run: |
          # The payload aggregates SDK stage *summaries*. semgrep runs the raw
          # semgrep binary and emits no *_ci_summary.json, so it is not a required
          # summary stage here (it is still enforced by job-result below).
          l9-ci gate \
            --input-dir artifacts/ci \
            --required validate,lint,test,security \
            --emit-agent-payload artifacts/agent_review_payload.json
      - name: Upload Gate Summary And Agent Payload
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: l9-ci-agent-review-payload-${{ inputs.python-version }}
          path: |
            artifacts/ci/*
            artifacts/agent_review_payload.json
          if-no-files-found: error
      - name: Evaluate Required Results
        if: always()
        env:
          CHANGED_FILES: ${{ inputs.changed-files }}
          PR_LABELS: ${{ inputs.pr-labels }}
          LABELS_KNOWN: ${{ inputs.labels-known }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          changed = [v.strip() for v in os.environ.get("CHANGED_FILES", "").split(",") if v.strip()]
          labels = [v.strip() for v in os.environ.get("PR_LABELS", "").split(",") if v.strip()]
          Path("changed_files.txt").write_text(chr(10).join(changed), encoding="utf-8")
          Path("pr_labels.json").write_text(json.dumps(labels), encoding="utf-8")
          PY
          EXTRA_ARGS=""
          if [ -s changed_files.txt ]; then EXTRA_ARGS="$EXTRA_ARGS --changed-files-file changed_files.txt --pr-labels-file pr_labels.json"; fi
          if [ "$LABELS_KNOWN" != "true" ]; then EXTRA_ARGS="$EXTRA_ARGS --labels-unknown"; fi
          l9-ci gate \
            --required validate,lint,semgrep,test,security \
            --result validate=${{ needs.validate.result }} \
            --result lint=${{ needs.lint.result }} \
            --result semgrep=${{ needs.semgrep.result }} \
            --result test=${{ needs.test.result }} \
            --result security=${{ needs.security.result }} \
            --result sbom=${{ needs.sbom.result }} \
            --result scorecard=${{ needs.scorecard.result }} \
            $EXTRA_ARGS
