# --- L9_META ---
# l9_schema: 1
# origin: l9-ci-universal-base
# layer: [ci]
# tags: [L9_TEMPLATE, ci, reusable-workflow]
# owner: platform
# status: active
# --- /L9_META ---
name: PR Pipeline Gate

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
      source-dir:
        required: false
        type: string
        default: "."
      test-dir:
        required: false
        type: string
        default: "tests/"
      requirements-file:
        required: false
        type: string
        default: "requirements-ci.txt"
      extra-install-command:
        required: false
        type: string
        default: ""
      enable-pydantic-strict:
        required: false
        type: boolean
        default: false
      l9-ci-install-command:
        required: false
        type: string
        default: 'python -m pip install "l9-ci @ git+https://github.com/Quantum-L9/l9-ci-sdk.git@d32e84b7c00fc88b85f2639471dd64126251e09e"'
      changed-files:
        required: false
        type: string
        default: ""
      pr-labels:
        required: false
        type: string
        default: ""
      labels-known:
        required: false
        type: boolean
        default: true
      # ── MegaLinter consumer inputs ─────────────────────────────────────────
      # Controls for downstream Python and Node consumers to tune MegaLinter
      # without forking this workflow. All inputs are optional and safe to omit.
      enable-megalinter:
        description: >
          Run MegaLinter shared-hygiene job (actionlint, shellcheck, hadolint,
          dotenv-linter, markdownlint, yamllint, tflint, prettier/JSON).
          Python linting is always handled by the dedicated ruff/lint job.
        required: false
        type: boolean
        default: true
      megalinter-config:
        description: >
          Path or URL for .mega-linter.yml config. Defaults to the canonical
          l9-ci-core shared-hygiene base. Override in consumer repos via:
            megalinter-config: .mega-linter.yml   # local override
          Remote inheritance uses MegaLinter EXTENDS / MEGALINTER_CONFIG.
        required: false
        type: string
        default: "https://raw.githubusercontent.com/Quantum-L9/l9-ci-core/main/.mega-linter.yml"
      megalinter-validate-all:
        description: >
          When true, MegaLinter lints the entire codebase (suitable for
          nightly/scheduled runs). When false (default), only changed files
          are linted for PR-scoped speed.
        required: false
        type: boolean
        default: false
      megalinter-flavor:
        description: >
          MegaLinter Docker flavor to use. Options:
            ci_light   - CI/IaC surfaces only (smallest, recommended default)
            javascript - adds JS/TS ESLint + Prettier (use for Node repos)
            cupcake    - common multi-language mix
          See https://megalinter.io/latest/flavors/ for the full list.
        required: false
        type: string
        default: "ci_light"
      enable-node-lint:
        description: >
          When true, adds JAVASCRIPT_ES and TYPESCRIPT_ES linters to the
          MegaLinter run and installs node_modules via `npm ci --ignore-scripts`
          before linting. Requires a package.json + local .eslintrc.* config.
          Automatically switches the flavor to `javascript` when
          megalinter-flavor is still the default `ci_light`.
        required: false
        type: boolean
        default: false
    secrets:
      SDK_TOKEN:
        required: false

concurrency:
  group: l9-pr-pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Structure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            ${{ inputs.requirements-file }}
            pyproject.toml
      - name: Configure private SDK access
        env:
          SDK_TOKEN: ${{ secrets.SDK_TOKEN }}
        run: |
          if [ -n "${SDK_TOKEN:-}" ]; then
            export GIT_CONFIG_GLOBAL="${RUNNER_TEMP}/l9-sdk-gitconfig"
            git config --file "$GIT_CONFIG_GLOBAL" url."https://x-access-token:${SDK_TOKEN}@github.com/".insteadOf "https://github.com/"
            echo "GIT_CONFIG_GLOBAL=${GIT_CONFIG_GLOBAL}" >> "$GITHUB_ENV"
          fi
      - name: Install CI Tools
        run: |
          python -m pip install --upgrade pip
          if [ -f "${{ inputs.requirements-file }}" ]; then pip install -r "${{ inputs.requirements-file }}"; fi
          ${{ inputs.l9-ci-install-command }}
          if [ -n "${{ inputs.extra-install-command }}" ]; then ${{ inputs.extra-install-command }}; fi
          python -c "import yaml" 2>/dev/null || pip install pyyaml
      - name: Run L9 Validate Stage
        run: l9-ci run-pipeline --stage validate --ci github --emit-dir artifacts/ci
      - name: Validate YAML Files
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys, yaml
          errors = []
          for path in list(Path('.github/workflows').glob('*.yml')) + list(Path('.github/workflows').glob('*.yaml')):
              try:
                  yaml.safe_load(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  errors.append(f"{path}: {exc}")
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          PY
      - name: L9 PacketEnvelope Prohibition
        run: l9-ci check-transport-packet .
      - name: L9 Deprecated API Check
        run: l9-ci check-deprecated-api .
      - name: Validate Governance Thresholds
        run: l9-ci validate-thresholds --policy .github/governance/quality-thresholds.yaml
      - name: Validate Rule Modes
        run: l9-ci validate-rule-modes --policy .github/governance/rule-modes.yaml
      - name: Upload Validate Summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ci-summary-validate-${{ inputs.python-version }}
          path: artifacts/ci/*
          if-no-files-found: error

  # ── MEGALINTER — advisory shared-hygiene layer ─────────────────────────────
  # Runs after validate. Controlled entirely by workflow_call inputs so each
  # consumer can choose flavor, config URL, and scope without forking this file.
  #
  # Python:  ruff/lint job below owns Python linting (fast, no Docker overhead).
  # Node:    Set enable-node-lint: true + megalinter-flavor: javascript to add
  #          JAVASCRIPT_ES / TYPESCRIPT_ES on top of the shared hygiene set.
  # Remote:  Set megalinter-config to a URL to inherit a shared base policy via
  #          MEGALINTER_CONFIG / EXTENDS (constellation-wide policy reuse).
  megalinter:
    name: MegaLinter (${{ inputs.megalinter-flavor }}, advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    if: inputs.enable-megalinter
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      # Node consumers: install deps so local ESLint config resolves correctly.
      - name: Install Node dependencies (Node lint only)
        if: inputs.enable-node-lint
        run: |
          if [ -f package.json ]; then
            npm ci --ignore-scripts
          else
            echo "[SKIP] no package.json found — skipping npm ci"
          fi

      - name: Resolve MegaLinter flavor
        id: flavor
        run: |
          FLAVOR="${{ inputs.megalinter-flavor }}"
          # Auto-upgrade to javascript flavor when Node lint is enabled and the
          # caller left the flavor at the default ci_light.
          if [ "${{ inputs.enable-node-lint }}" = "true" ] && [ "$FLAVOR" = "ci_light" ]; then
            FLAVOR="javascript"
            echo "::notice::enable-node-lint=true detected; upgrading flavor ci_light -> javascript"
          fi
          echo "flavor=$FLAVOR" >> "$GITHUB_OUTPUT"

      - name: Run MegaLinter
        uses: oxsecurity/megalinter/flavors/${{ steps.flavor.outputs.flavor }}@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MEGALINTER_CONFIG: ${{ inputs.megalinter-config }}
          VALIDATE_ALL_CODEBASE: ${{ inputs.megalinter-validate-all }}
          DISABLE_ERRORS: true
          # Node lint: add JS/TS ESLint linters on top of the shared hygiene set.
          # The linter keys are appended to whatever ENABLE_LINTERS is set in the
          # config file referenced by MEGALINTER_CONFIG.
          JAVASCRIPT_ES_ARGUMENTS: ${{ inputs.enable-node-lint && '--no-ignore' || '' }}
          JAVASCRIPT_ES_CLI_EXECUTABLE: ${{ inputs.enable-node-lint && 'node_modules/.bin/eslint' || '' }}
          TYPESCRIPT_ES_CLI_EXECUTABLE: ${{ inputs.enable-node-lint && 'node_modules/.bin/eslint' || '' }}

      - name: Upload MegaLinter report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: megalinter-report
          path: megalinter-reports/
          if-no-files-found: ignore
          retention-days: 30

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            ${{ inputs.requirements-file }}
            pyproject.toml
      - name: Configure private SDK access
        env:
          SDK_TOKEN: ${{ secrets.SDK_TOKEN }}
        run: |
          if [ -n "${SDK_TOKEN:-}" ]; then
            export GIT_CONFIG_GLOBAL="${RUNNER_TEMP}/l9-sdk-gitconfig"
            git config --file "$GIT_CONFIG_GLOBAL" url."https://x-access-token:${SDK_TOKEN}@github.com/".insteadOf "https://github.com/"
            echo "GIT_CONFIG_GLOBAL=${GIT_CONFIG_GLOBAL}" >> "$GITHUB_ENV"
          fi
      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          if [ -f "${{ inputs.requirements-file }}" ]; then pip install -r "${{ inputs.requirements-file }}"; fi
          ${{ inputs.l9-ci-install-command }}
          command -v ruff >/dev/null 2>&1 || pip install ruff
          command -v mypy >/dev/null 2>&1 || pip install mypy
      - name: Run L9 Lint Stage
        run: l9-ci run-pipeline --stage lint --ci github --emit-dir artifacts/ci
      - run: ruff check . --output-format=github
      - run: ruff format --check .
      - run: mypy "${{ inputs.source-dir }}" --show-error-codes --pretty --install-types --non-interactive --ignore-missing-imports
      - name: Upload Lint Summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ci-summary-lint-${{ inputs.python-version }}
          path: artifacts/ci/*
          if-no-files-found: error

  semgrep:
    name: Semgrep Policy Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Run Semgrep When Config Exists
        run: |
          if [ -d .semgrep ]; then
            python -m pip install --upgrade pip semgrep
            semgrep --config .semgrep/ --error --quiet --exclude tests/fixtures/semgrep
          else
            echo "No .semgrep directory; skipping semgrep policy check."
          fi

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            ${{ inputs.requirements-file }}
            pyproject.toml
      - name: Configure private SDK access
        env:
          SDK_TOKEN: ${{ secrets.SDK_TOKEN }}
        run: |
          if [ -n "${SDK_TOKEN:-}" ]; then
            export GIT_CONFIG_GLOBAL="${RUNNER_TEMP}/l9-sdk-gitconfig"
            git config --file "$GIT_CONFIG_GLOBAL" url."https://x-access-token:${SDK_TOKEN}@github.com/".insteadOf "https://github.com/"
            echo "GIT_CONFIG_GLOBAL=${GIT_CONFIG_GLOBAL}" >> "$GITHUB_ENV"
          fi
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "${{ inputs.requirements-file }}" ]; then pip install -r "${{ inputs.requirements-file }}"; fi
          ${{ inputs.l9-ci-install-command }}
          pip install -e ".[dev]" || pip install -e . || echo "::notice::no local editable package to install"
          command -v pytest >/dev/null 2>&1 || pip install pytest
          python -c "import pytest_cov" 2>/dev/null || pip install pytest-cov
          python -c "import xdist" 2>/dev/null || pip install pytest-xdist
          python -c "import pytest_timeout" 2>/dev/null || pip install pytest-timeout
      - name: Resolve Governance Coverage Threshold
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          from pathlib import Path
          from l9_ci.governance.thresholds import load_threshold_policy
          policy = load_threshold_policy(Path('.github/governance/quality-thresholds.yaml'))
          print(f"L9_COVERAGE_THRESHOLD={policy.coverage_for()}")
          PY
      - name: Run L9 Test Stage
        run: l9-ci run-pipeline --stage test --ci github --matrix python=${{ inputs.python-version }} --emit-dir artifacts/ci
      - name: Run Tests with Coverage
        env:
          TESTING: "true"
        run: |
          PYTHONPATH=. pytest "${{ inputs.test-dir }}" -n auto --cov="${{ inputs.source-dir }}" --cov-report=xml --cov-report=term-missing --cov-fail-under="$L9_COVERAGE_THRESHOLD" --timeout=300 --tb=short -v
      - name: Upload Test Summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ci-summary-test-${{ inputs.python-version }}
          path: artifacts/ci/*
          if-no-files-found: error
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6.0.2
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    permissions:
      contents: read
      security-events: write
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Configure private SDK access
        env:
          SDK_TOKEN: ${{ secrets.SDK_TOKEN }}
        run: |
          if [ -n "${SDK_TOKEN:-}" ]; then
            export GIT_CONFIG_GLOBAL="${RUNNER_TEMP}/l9-sdk-gitconfig"
            git config --file "$GIT_CONFIG_GLOBAL" url."https://x-access-token:${SDK_TOKEN}@github.com/".insteadOf "https://github.com/"
            echo "GIT_CONFIG_GLOBAL=${GIT_CONFIG_GLOBAL}" >> "$GITHUB_ENV"
          fi
      - run: |
          python -m pip install --upgrade pip
          if [ -f "${{ inputs.requirements-file }}" ]; then pip install -r "${{ inputs.requirements-file }}"; fi
          ${{ inputs.l9-ci-install-command }}
          command -v pip-audit >/dev/null 2>&1 || pip install pip-audit
          command -v safety >/dev/null 2>&1 || pip install safety
          command -v bandit >/dev/null 2>&1 || pip install bandit
      - name: Run L9 Security Stage
        run: l9-ci run-pipeline --stage security --ci github --emit-dir artifacts/ci
      - name: Upload Security Summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ci-summary-security-${{ inputs.python-version }}
          path: artifacts/ci/*
          if-no-files-found: error
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
      - name: Run pip-audit
        run: pip-audit --desc
      - name: Run Safety Check
        run: safety check || echo "Safety warnings are non-blocking"
      - name: Run Bandit
        run: bandit -r "${{ inputs.source-dir }}" -ll -f screen --exclude ./venv,./.venv,./tests,./build,./dist || echo "Bandit warnings are non-blocking"
      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: high

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Generate Software Bill of Materials
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-release-assets: false

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: scorecard.sarif

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs: [validate, megalinter, lint, semgrep, test, security, sbom, scorecard]
    permissions:
      contents: read
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}
      - name: Configure private SDK access
        env:
          SDK_TOKEN: ${{ secrets.SDK_TOKEN }}
        run: |
          if [ -n "${SDK_TOKEN:-}" ]; then
            export GIT_CONFIG_GLOBAL="${RUNNER_TEMP}/l9-sdk-gitconfig"
            git config --file "$GIT_CONFIG_GLOBAL" url."https://x-access-token:${SDK_TOKEN}@github.com/".insteadOf "https://github.com/"
            echo "GIT_CONFIG_GLOBAL=${GIT_CONFIG_GLOBAL}" >> "$GITHUB_ENV"
          fi
      - name: Install L9 CI SDK
        run: |
          python -m pip install --upgrade pip
          ${{ inputs.l9-ci-install-command }}
      - name: Download CI Summary Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: ci-summary-*
          path: artifacts/ci
          merge-multiple: true
      - name: Run L9 Gate Stage
        run: l9-ci run-pipeline --stage gate --ci github --emit-dir artifacts/ci
      - name: Render Agent Review Payload
        run: |
          l9-ci gate \
            --input-dir artifacts/ci \
            --required validate,lint,semgrep,test,security \
            --emit-agent-payload artifacts/agent_review_payload.json
      - name: Upload Gate Summary And Agent Payload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: l9-ci-agent-review-payload-${{ inputs.python-version }}
          path: |
            artifacts/ci/*
            artifacts/agent_review_payload.json
          if-no-files-found: error
      - name: Evaluate Required Results
        env:
          CHANGED_FILES: ${{ inputs.changed-files }}
          PR_LABELS: ${{ inputs.pr-labels }}
          LABELS_KNOWN: ${{ inputs.labels-known }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          changed = [v.strip() for v in os.environ.get("CHANGED_FILES", "").split(",") if v.strip()]
          labels = [v.strip() for v in os.environ.get("PR_LABELS", "").split(",") if v.strip()]
          Path("changed_files.txt").write_text(chr(10).join(changed), encoding="utf-8")
          Path("pr_labels.json").write_text(json.dumps(labels), encoding="utf-8")
          PY
          EXTRA_ARGS=""
          if [ -s changed_files.txt ]; then EXTRA_ARGS="$EXTRA_ARGS --changed-files-file changed_files.txt --pr-labels-file pr_labels.json"; fi
          if [ "$LABELS_KNOWN" != "true" ]; then EXTRA_ARGS="$EXTRA_ARGS --labels-unknown"; fi
          l9-ci gate \
            --required validate,lint,semgrep,test,security \
            --result validate=${{ needs.validate.result }} \
            --result megalinter=${{ needs.megalinter.result }} \
            --result lint=${{ needs.lint.result }} \
            --result semgrep=${{ needs.semgrep.result }} \
            --result test=${{ needs.test.result }} \
            --result security=${{ needs.security.result }} \
            --result sbom=${{ needs.sbom.result }} \
            --result scorecard=${{ needs.scorecard.result }} \
            $EXTRA_ARGS
