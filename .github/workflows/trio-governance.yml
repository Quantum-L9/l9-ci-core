# --- L9_META ---
# l9_schema: 1
# origin: l9-ci-core
# layer: [ci, governance, trio]
# tags: [L9_TEMPLATE, trio, governance, reusable-workflow]
# owner: platform
# status: active
# --- /L9_META ---
name: L9 Trio Governance Gate

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
      changed-files:
        required: false
        type: string
        default: ""
      policy-path:
        required: false
        type: string
        default: ".github/governance/audit-policy.yml"
      baseline-path:
        required: false
        type: string
        default: ".github/governance/audit-baseline.json"
      classifier-path:
        required: false
        type: string
        default: ".github/scripts/classify_pr.py"
      audit-token-secret-name:
        required: false
        type: string
        default: "L9_AUDIT_BOT_TOKEN"
      implementer-token-secret-name:
        required: false
        type: string
        default: "L9_IMPLEMENTER_BOT_TOKEN"
      validator-token-secret-name:
        required: false
        type: string
        default: "L9_VALIDATOR_BOT_TOKEN"
      l9-ci-install-command:
        required: false
        type: string
        default: "pip install l9-ci"
      pr-labels:
        required: false
        type: string
        default: ""
      labels-known:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  trio-governance:
    name: trio-governance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install L9 CI SDK
        run: |
          python -m pip install --upgrade pip
          ${{ inputs.l9-ci-install-command }}
      - name: Validate threshold policy
        run: l9-ci validate-thresholds --policy .github/governance/quality-thresholds.yaml
      - name: Validate rule-mode policy
        run: l9-ci validate-rule-modes --policy .github/governance/rule-modes.yaml
      - name: Validate governance approval for protected edits
        env:
          CHANGED_FILES: ${{ inputs.changed-files }}
          PR_LABELS: ${{ inputs.pr-labels }}
          LABELS_KNOWN: ${{ inputs.labels-known }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          changed = [v.strip() for v in os.environ.get("CHANGED_FILES", "").replace(",", "\n").splitlines() if v.strip()]
          labels = [v.strip() for v in os.environ.get("PR_LABELS", "").replace(",", "\n").splitlines() if v.strip()]
          Path("changed_files.txt").write_text("\n".join(changed), encoding="utf-8")
          Path("pr_labels.json").write_text(json.dumps(labels), encoding="utf-8")
          PY
          EXTRA_ARGS=""
          if [ "$LABELS_KNOWN" != "true" ]; then EXTRA_ARGS="--labels-unknown"; fi
          l9-ci validate-governance-approval --changed-files-file changed_files.txt --pr-labels-file pr_labels.json $EXTRA_ARGS
      - name: Validate governance files
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path
          import yaml

          policy = Path("${{ inputs.policy-path }}")
          baseline = Path("${{ inputs.baseline-path }}")
          classifier = Path("${{ inputs.classifier-path }}")
          missing = [str(p) for p in (policy, baseline, classifier) if not p.exists()]
          if missing:
              print("Missing governance file(s): " + ", ".join(missing), file=sys.stderr)
              raise SystemExit(1)
          data = yaml.safe_load(policy.read_text())
          required = {
              "docs_only", "ci_workflow", "dependency_python", "app_code",
              "security", "compliance", "unknown_diff",
          }
          observed = set(data.get("canonical_pr_classes", []))
          if observed != required:
              print(f"Invalid canonical_pr_classes: {sorted(observed)}", file=sys.stderr)
              raise SystemExit(1)
          baseline_data = json.loads(baseline.read_text())
          semantics = baseline_data.get("semantics", {})
          expected = {
              "in_baseline_and_not_touched": "advisory",
              "in_baseline_and_touched_dangerous": "blocking",
              "not_in_baseline_and_high_or_critical": "blocking",
              "not_in_baseline_and_low_medium": "advisory",
          }
          if semantics != expected:
              print("Invalid audit-baseline semantics", file=sys.stderr)
              raise SystemExit(1)
          print("Governance files valid.")
          PY
      - name: Validate distinct trio token names
        run: |
          python - <<'PY'
          import sys
          names = {
              "audit": "${{ inputs.audit-token-secret-name }}",
              "implementer": "${{ inputs.implementer-token-secret-name }}",
              "validator": "${{ inputs.validator-token-secret-name }}",
          }
          if len(set(names.values())) != len(names):
              print("Trio token secret names must be distinct", file=sys.stderr)
              raise SystemExit(1)
          print("Trio token secret names are distinct.")
          PY
      - name: Classify changed files
        env:
          CHANGED_FILES: ${{ inputs.changed-files }}
        run: |
          if [ -n "${CHANGED_FILES}" ]; then
            python "${{ inputs.classifier-path }}"
          else
            echo "No changed-files input supplied; classifier smoke test only."
            python "${{ inputs.classifier-path }}" .github/workflows/example.yml --plain | grep -x ci_workflow
          fi
      - name: Validate trio marker separation
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path
          text = Path("${{ inputs.policy-path }}").read_text()
          required = "<!-- l9-ci-audit-marker: v1 -->"
          forbidden = [
              "<!-- l9-audit-marker: v1 -->",
              "<!-- l9-implementer-marker: v1 -->",
              "<!-- l9-validator-marker: v1 -->",
          ]
          if required not in text:
              print("Missing CI audit marker", file=sys.stderr)
              raise SystemExit(1)
          for marker in forbidden:
              if f"marker: {marker}" in text:
                  print(f"Marker collision: {marker}", file=sys.stderr)
                  raise SystemExit(1)
          print("Trio marker separation valid.")
          PY
  trio-governance-passed:
    name: trio-governance-passed
    runs-on: ubuntu-latest
    if: always()
    needs: [trio-governance]
    steps:
      - name: Evaluate trio governance gate
        run: |
          test "${{ needs.trio-governance.result }}" = "success"
