name: Phase 3 governance validation
on:
  pull_request:
    paths:
      - ".github/governance/**"
      - ".github/actions/resolve-governance/**"
      - ".github/actions/validate-governance/**"
      - ".l9/governance-contract.yaml"
      - "tests/governance/**"
  push:
    branches:
      - main
    paths:
      - ".github/governance/**"
      - ".github/actions/resolve-governance/**"
      - ".github/actions/validate-governance/**"
      - ".l9/governance-contract.yaml"
      - "tests/governance/**"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout immutable event revision
        env:
          REPOSITORY: ${{ github.repository }}
          REVISION: ${{ github.sha }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin \
            "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}.git"
          git -c protocol.version=2 fetch --depth=1 origin "${REVISION}"
          git checkout --detach FETCH_HEAD
          git remote set-url origin \
            "https://github.com/${REPOSITORY}.git"
      - name: Validate governance documents
        uses: ./.github/actions/validate-governance
      - name: Run governance tests
        run: |
          set -euo pipefail
          python3 -m unittest discover \
            --start-directory tests/governance \
            --pattern 'test_*.py' \
            --verbose
