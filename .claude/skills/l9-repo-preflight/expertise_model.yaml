# L9_META
# l9_schema: 1
# parent: l9-repo-preflight
# layer: reference
# role: expertise_model
# tags: [preflight, probe, readiness-gate, git-hygiene, baseline, expertise, exemplary]
# owner: igor_beylin
# status: active
# version: 1.0.0
# updated: 2026-07-15
# Purpose: Compressed judgment extracted from the 10X Repository Preflight Decision
# Tree and the read-only probe, filtered through the L9 fail-closed doctrine.
# Consumed by scripts/validate_exemplary_skill.py.

expertise_model:
  experts:
    - repo-forensics (identity: right repo/branch/commit, remotes, divergence, detached HEAD)
    - worktree-hygiene (tracked vs generated vs unknown; gitignore diagnostics; safe cleanup)
    - toolchain-conformance (python/pkg-mgr/test-tools vs contract; repo-defined tooling wins)
    - build-and-install (declared install path, editable installs, importability, repo-vs-env faults)
    - baseline-validator (pytest/mypy/ruff/schema; existing-vs-new failure classification)

  doctrine:
    - Gather evidence with a read-only probe before answering any gate; never assert from memory.
    - Verified repository evidence outranks the blueprint; when they disagree, the blueprint is wrong.
    - Never continue with unknown files; unidentified untracked content is a hard stop.
    - Never continue if the baseline cannot be reproduced; an irreproducible baseline is a stop.
    - Never modify code until repository facts (gates 1-3) are verified.
    - Adapt the blueprint to verified evidence; never reshape the repo to satisfy an assumption.
    - Every NO loops back through Fix -> Re-run Probe -> Verify -> Continue; no gate is waved through.
    - Classify every failure as existing (record, may be non-blocking) or new (stop and fix first).
    - Autofix only safe non-code hygiene and install; unknown files, code, and baselines are off-limits.
    - Resolve the smallest blocker first, then re-run; do not batch speculative fixes.

  invariants:
    - an unknown untracked file present => verdict NOT READY (Golden Rule 1)
    - a baseline that will not reproduce => verdict NOT READY (Golden Rule 2)
    - repository identity unverified => no code mutation permitted (Golden Rule 3)
    - a foundation missing but not expected here => adapt the blueprint, never fail the repo (Golden Rule 4)
    - repo already defines a tool/version => follow it, never replace it
    - the probe is re-run after every fix; gates are never verified from stale evidence
    - existing baseline failures are recorded with evidence, never hidden or "fixed" to pass
    - a new failure introduced after evidence-verification blocks until fixed
    - unverifiable facts are labeled Unknown, never fabricated as pass
    - autofix never touches an unknown file, tracked code, or a validation baseline

  authority_hierarchy:
    - security_safety_legal > verified_evidence
    - verified_evidence > explicit_expected_contract
    - explicit_expected_contract > blueprint_assumptions
    - blueprint_assumptions > convenience_speed
    - unknown > fabrication (fail closed; stop and report)

  activation_signals:
    - user asks to preflight a repo, run the probe, or verify a checkout before starting work
    - user references the preflight decision tree, the eight gates, or the repository probe
    - user wants to confirm worktree cleanliness, baseline reproducibility, or toolchain match
    - user asks whether it is safe to build/implement on the current repo/branch/commit
    - user wants a readiness verdict + the single next action gating implementation

  reject_signals:
    - user asks to implement a feature or change code (preflight gates it; it is not the work itself)
    - no repository/checkout is available to probe (nothing to gather evidence from)
    - user wants to force-pass a red line (continue with unknown files or an unreproducible baseline)
    - request is to reshape the repo to match a blueprint (inverts Golden Rule 4)
    - user wants human prose advice only, not a machine-evaluated gate result

  adapters:
    - "src-layout package repo -> expect src/<pkg>, editable install, import checks; foundations = pyproject+src+tests."
    - "non-src scripts/governance repo (this repo) -> Python under .github/scripts; no src/ or AGENTS.md expected; foundations = pyproject+tests+schemas; missing src => adapt, not fail."
    - "greenfield/near-empty repo -> most foundations absent-and-expected-absent; record Unknowns; never fabricate a baseline."

  failure_modes:
    - "unknown-file-waved: continuing past an unidentified untracked file -> red line, NOT READY until identified."
    - "blueprint-forced: failing gate 4/5 because the repo lacks a foreign assumption -> adapt the blueprint instead."
    - "baseline-misclass: calling a new failure existing (or vice-versa) -> compare against recorded baseline; new blocks."
    - "stale-gate: verifying a gate from a pre-fix probe log -> re-run the probe after every fix."
    - "tooling-replace: swapping a repo-defined tool/version -> follow the repository; record a blocker, do not replace."

  leverage_points:
    - Read-only probe: one evidence pass feeds all eight gates; no repeated ad-hoc inspection.
    - Deterministic evaluate_preflight.py: turns the decision tree into a check with verdicts, not prose.
    - Evidence-over-blueprint rule: a foreign blueprint never produces a false failure on a real repo.
    - Existing-vs-new baseline split: a known-red repo is still preflightable; only regressions block.
    - Single-next-action output: collapses a NO into the one smallest fix, then re-runs — high-velocity convergence.
