on: push
jobs:
  download:
    runs-on: windows-latest
    steps:
      - name: Download and verify tool
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # l9-download: gitleaks-windows-x64
          $ToolUrl = "https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_windows_x64.zip"
          $ToolSha256 = "a1b2c3d4e5f60718293a4b5c6d7e8f901234567890abcdef1234567890abcdef"
          $Archive = Join-Path $env:RUNNER_TEMP "gitleaks.zip"
          Invoke-WebRequest `
            -Uri $ToolUrl `
            -OutFile $Archive `
            -UseBasicParsing
          $Actual = (Get-FileHash `
            -Path $Archive `
            -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($Actual -ne $ToolSha256.ToLowerInvariant()) {
            throw "SHA-256 mismatch for $Archive"
          }
          Expand-Archive `
            -Path $Archive `
            -DestinationPath (Join-Path $env:RUNNER_TEMP "gitleaks")
