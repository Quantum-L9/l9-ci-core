on: push
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Invalid digest length
        run: |
          set -euo pipefail
          # l9-download: gitleaks-linux-x64
          TOOL_URL="https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz"
          TOOL_SHA256="deadbeef"
          curl --fail --location "$TOOL_URL" \
            --output "$RUNNER_TEMP/gitleaks.tar.gz"
          printf '%s  %s\n' \
            "$TOOL_SHA256" \
            "$RUNNER_TEMP/gitleaks.tar.gz" \
            | sha256sum --check --strict
