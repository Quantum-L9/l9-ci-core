on: push
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download gitleaks
        run: |
          set -euo pipefail
          # l9-download: gitleaks-linux-x64
          TOOL_URL="https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz"
          TOOL_SHA256="a1b2c3d4e5f60718293a4b5c6d7e8f901234567890abcdef1234567890abcdef"
          curl --fail --location "$TOOL_URL" --output "$RUNNER_TEMP/gl.tar.gz"
          sha256sum --check --strict <<< "$TOOL_SHA256  $RUNNER_TEMP/gl.tar.gz"
          tar -xzf "$RUNNER_TEMP/gl.tar.gz" -C "$RUNNER_TEMP"
