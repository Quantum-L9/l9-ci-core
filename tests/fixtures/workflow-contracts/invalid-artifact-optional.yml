on: push
jobs:
  bootstrap-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Upload bootstrap evidence
        if: always()
        uses: actions/upload-artifact@1111111111111111111111111111111111111111
        with:
          name: bootstrap-results
          path: results/
          if-no-files-found: warn
