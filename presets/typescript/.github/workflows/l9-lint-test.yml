# L9 Consumer Lint + Test — TypeScript Preset (LOCKED STRUCTURE)
#
# DO NOT EDIT workflow structure — only the env: block is consumer-configurable.
# Managed by l9-ci-core presets/typescript.
#
# Conventions:
#   - Immutable event-revision checkout (no floating action ref)
#   - SHA-pinned external actions
#   - Least privilege (contents: read only)
name: L9 Lint and Test
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# ── CONFIGURABLE: agent sets these during activation ───────────────────────────
env:
  NODE_VERSION: "20"
  PACKAGE_MANAGER: "npm"
  SOURCE_DIR: "."
  HAS_TYPESCRIPT: "true"

permissions:
  contents: read

concurrency:
  group: l9-lint-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout immutable event revision
        env:
          REPOSITORY: ${{ github.repository }}
          REVISION: ${{ github.sha }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin \
            "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}.git"
          git -c protocol.version=2 fetch --depth=1 origin "${REVISION}"
          git checkout --detach FETCH_HEAD
          git remote set-url origin "https://github.com/${REPOSITORY}.git"

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ env.PACKAGE_MANAGER }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          case "${PACKAGE_MANAGER}" in
            npm)  if [ -f package-lock.json ]; then npm ci; else npm install; fi ;;
            pnpm) corepack enable && (if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile; else pnpm install; fi) ;;
            yarn) corepack enable && (if [ -f yarn.lock ]; then yarn install --frozen-lockfile; else yarn install; fi) ;;
            *) echo "::error::unknown PACKAGE_MANAGER ${PACKAGE_MANAGER}" && exit 1 ;;
          esac

      - name: eslint
        run: |
          set -euo pipefail
          if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.lint ? 0 : 1)" 2>/dev/null; then
            ${PACKAGE_MANAGER} run lint
          else
            npx --yes eslint "${SOURCE_DIR}" --max-warnings=0
          fi

      - name: tsc --noEmit
        if: env.HAS_TYPESCRIPT == 'true'
        run: |
          set -euo pipefail
          if [ -f tsconfig.json ]; then
            npx --yes tsc --noEmit -p tsconfig.json
          else
            echo "::notice::no tsconfig.json found, skipping type check"
          fi

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout immutable event revision
        env:
          REPOSITORY: ${{ github.repository }}
          REVISION: ${{ github.sha }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin \
            "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}.git"
          git -c protocol.version=2 fetch --depth=1 origin "${REVISION}"
          git checkout --detach FETCH_HEAD
          git remote set-url origin "https://github.com/${REPOSITORY}.git"

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ env.PACKAGE_MANAGER }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          case "${PACKAGE_MANAGER}" in
            npm)  if [ -f package-lock.json ]; then npm ci; else npm install; fi ;;
            pnpm) corepack enable && (if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile; else pnpm install; fi) ;;
            yarn) corepack enable && (if [ -f yarn.lock ]; then yarn install --frozen-lockfile; else yarn install; fi) ;;
            *) echo "::error::unknown PACKAGE_MANAGER ${PACKAGE_MANAGER}" && exit 1 ;;
          esac

      - name: Run test suite
        env:
          CI: "true"
        run: |
          set -euo pipefail
          if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.test ? 0 : 1)" 2>/dev/null; then
            ${PACKAGE_MANAGER} test
          else
            echo "::notice::no test script defined in package.json, skipping"
          fi
