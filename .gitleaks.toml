# L9 Constellation — Gitleaks configuration
#
# Extends the built-in gitleaks default ruleset (community-maintained secret
# detection rules) rather than replacing it. This file's sole purpose is to
# give `GITLEAKS_CONFIG=.gitleaks.toml` (set in security.yml and
# pr-pipeline.yml) a real file to resolve, closing finding F-003: gitleaks
# exits fatally when GITLEAKS_CONFIG points to a nonexistent path.
#
# See: https://github.com/gitleaks/gitleaks#configuration

[extend]
# Inherit every built-in rule; add repo-specific rules/allowlist below only if
# a real false positive is found in this repo's history.
useDefault = true

[allowlist]
description = "Global allowlist for known non-secret test fixtures"
paths = [
  # Semgrep test fixtures intentionally reference secret-shaped parameter
  # names (e.g. `api_key: str`) to exercise the "bad" detection path in
  # governance tests. They contain no real secret values.
  '''tests/fixtures/semgrep/.*''',
]
