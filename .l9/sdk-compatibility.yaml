schema: l9.sdk-compatibility/v1
metadata:
  status: authoritative
  consumer: Quantum-L9/l9-ci-core
  producer: Quantum-L9/l9-ci-sdk
default:
  source: git
  repository: https://github.com/Quantum-L9/l9-ci-sdk.git
  revision: d8ec01f141b9eec24d22ffac84a83ec7280eef72
supported:
  # Current default: adds the deterministic baseline-ratchet kernel
  # (`l9-ci baseline ...`) used by the reusable baseline-ratchet workflow.
  - source: git
    repository: https://github.com/Quantum-L9/l9-ci-sdk.git
    revision: d8ec01f141b9eec24d22ffac84a83ec7280eef72
    integration_contract: l9.integration-contract/v1
    artifact_protocols:
      - l9.finding-bundle/v1
      - l9.agent-review-payload/v1
    required_cli_paths:
      - semgrep normalize
      - bundle validate
      - bundle project-agent-payload
      - compatibility check
      - baseline compare-tests
      - baseline scan-packet-envelope
      - baseline compare-scan
      - baseline validate-ledger
  # Retained one release for rollback; identical CLI minus the baseline
  # command family.
  - source: git
    repository: https://github.com/Quantum-L9/l9-ci-sdk.git
    revision: 6368ba17a98231d461a13b71e149e114ad766834
    integration_contract: l9.integration-contract/v1
    artifact_protocols:
      - l9.finding-bundle/v1
      - l9.agent-review-payload/v1
    required_cli_paths:
      - semgrep normalize
      - bundle validate
      - bundle project-agent-payload
      - compatibility check
  # Retained one release for rollback; CLI-identical to 6368ba1 (that SDK
  # commit touched only .github/, not l9_ci/ or .l9/integration-contract).
  - source: git
    repository: https://github.com/Quantum-L9/l9-ci-sdk.git
    revision: 850eb0813752d3827cda47054da08791da00f3fe
    integration_contract: l9.integration-contract/v1
    artifact_protocols:
      - l9.finding-bundle/v1
      - l9.agent-review-payload/v1
    required_cli_paths:
      - semgrep normalize
      - bundle validate
      - bundle project-agent-payload
      - compatibility check
policy:
  arbitrary_install_commands_allowed: false
  dependency_manifest_install_allowed: true
  floating_git_references_allowed: false
  short_git_revisions_allowed: false
  branches_allowed: false
  tags_allowed: false
  unlisted_revisions_allowed: false
  fallback_to_parent_allowed: false
  fallback_to_legacy_cli_allowed: false
