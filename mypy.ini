#
# Mypy config for l9-ci-core's own Python. The repo has no typed deps of its own;
# yaml/requests are untyped third parties, so silence import-untyped (and missing
# stubs) rather than vendoring stub packages into a workflow-only repo.
[mypy]
ignore_missing_imports = True
disable_error_code = import-untyped
