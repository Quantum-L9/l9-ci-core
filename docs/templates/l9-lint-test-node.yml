# L9 consumer lint + test workflow for Node.js / TypeScript (TEMPLATE)
#
# Copy into the CONSUMER repo at `.github/workflows/l9-lint-test-node.yml`.
# This is the Node.js counterpart to l9-lint-test.yml (Python). It provides the
# TypeScript/Node hygiene half that v1's pr-pipeline never covered.
#
# Gates:
#   eslint            -> lint / style / correctness rules (uses your repo config)
#   tsc --noEmit      -> type-check the whole tree against the type system with
#                        NO compiled output. Honors your tsconfig (e.g. strict).
#                        It proves the types are sound; it does not run the code.
#   vitest run        -> one-shot, non-interactive test run of your *.test.ts.
#                        `run` is required in CI — bare `vitest` is watch mode
#                        and would hang the job forever.
#
# v2 conventions: immutable event-revision checkout, explicit least-privilege
# permissions (contents: read, no write scopes). Node comes preinstalled on
# ubuntu-latest; see the optional setup-node block to pin a specific version.
name: L9 Lint and Test (Node)

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: l9-lint-test-node-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: ESLint and tsc --noEmit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout immutable event revision
        env:
          REPOSITORY: ${{ github.repository }}
          REVISION: ${{ github.sha }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin \
            "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}.git"
          git -c protocol.version=2 fetch --depth=1 origin "${REVISION}"
          git checkout --detach FETCH_HEAD
          git remote set-url origin "https://github.com/${REPOSITORY}.git"

      # OPTIONAL — pin a specific Node version. ubuntu-latest ships Node 20+ by
      # default, which this template uses as-is. To pin, uncomment and set a
      # full 40-char commit SHA you trust for actions/setup-node:
      # - uses: actions/setup-node@<full-40-char-sha>  # v4.x
      #   with:
      #     node-version-file: package.json   # or .nvmrc, or node-version: "20"

      - name: Install dependencies
        run: |
          set -euo pipefail
          corepack enable || true
          if [ -f pnpm-lock.yaml ]; then
            corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack prepare yarn@stable --activate
            yarn install --immutable
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi

      - name: ESLint
        run: npx --no-install eslint . || npx eslint .

      - name: Type-check (tsc --noEmit)
        run: npx --no-install tsc --noEmit || npx tsc --noEmit

  test:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout immutable event revision
        env:
          REPOSITORY: ${{ github.repository }}
          REVISION: ${{ github.sha }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin \
            "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}.git"
          git -c protocol.version=2 fetch --depth=1 origin "${REVISION}"
          git checkout --detach FETCH_HEAD
          git remote set-url origin "https://github.com/${REPOSITORY}.git"

      # OPTIONAL setup-node pin — see the lint job above.

      - name: Install dependencies
        run: |
          set -euo pipefail
          corepack enable || true
          if [ -f pnpm-lock.yaml ]; then
            corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack prepare yarn@stable --activate
            yarn install --immutable
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Vitest (one-shot, non-interactive)
        env:
          CI: "true"
        run: npx --no-install vitest run || npx vitest run
        # For coverage, install @vitest/coverage-v8 and use:
        #   npx vitest run --coverage
